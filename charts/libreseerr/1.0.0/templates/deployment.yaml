apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "libreseerr.fullname" . }}
  labels:
    {{- include "libreseerr.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "libreseerr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "libreseerr.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            {{- if .Values.secretKey }}
            - name: SECRET_KEY
              value: {{ .Values.secretKey | quote }}
            {{- end }}
            {{- if .Values.timezone }}
            - name: TZ
              value: {{ .Values.timezone | quote }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: {{ .Values.storage.config.mountPath }}
          livenessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /login
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          {{- if eq .Values.storage.config.type "hostPath" }}
          hostPath:
            path: {{ .Values.storage.config.hostPath }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "libreseerr.fullname" . }}-config
          {{- end }}
