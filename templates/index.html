<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libreseerr</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar Overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-brand">
            <img src="/static/LibreseerrLogo.png" alt="Libreseerr" class="sidebar-logo">
            <span>Libreseerr</span>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="sidebar-link active" data-page="search">
                <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                </svg>
                <span>Discover</span>
            </a>
            <a href="#" class="sidebar-link" data-page="requests">
                <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
                <span>Requests</span>
            </a>
            <a href="#" class="sidebar-link admin-only" data-page="users">
                <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
                <span>Users</span>
            </a>
            <a href="#" class="sidebar-link admin-only" data-page="settings">
                <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span>Settings</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="sidebar-user">
                <span id="sidebar-username" class="sidebar-username"></span>
                <span id="sidebar-role" class="sidebar-role"></span>
            </div>
            <button class="sidebar-logout" onclick="doLogout()">
                <svg class="sidebar-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-wrapper">
        <!-- Header -->
        <header class="top-header">
            <button class="hamburger" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="header-search">
                <svg class="header-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search for books..." autocomplete="off">
            </div>
        </header>

        <main class="container">
            <!-- Search Page -->
            <div id="page-search" class="page active">
                <div id="search-results" class="results-grid"></div>
            </div>

            <!-- Requests Page -->
            <div id="page-requests" class="page">
                <div class="page-header">
                    <h2>Request History</h2>
                    <button id="refresh-btn" class="btn btn-secondary">Refresh Status</button>
                </div>
                <div id="requests-list" class="requests-list"></div>
            </div>

            <!-- Settings Page -->
            <div id="page-settings" class="page admin-only">
                <h2>Server Configuration</h2>
                <div class="settings-grid">
                    <div class="settings-card">
                        <h3>Ebook Server</h3>
                        <div class="form-group">
                            <label for="ebook-server-software">Server Software</label>
                            <select id="ebook-server-software">
                                <option value="readarr">Readarr</option>
                                <option value="bookshelf">Bookshelf</option>
                                <option value="lazylibrarian">LazyLibrarian</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="ebook-url">URL</label>
                            <input type="text" id="ebook-url" placeholder="http://192.168.1.100:8787">
                        </div>
                        <div class="form-group">
                            <label for="ebook-api">API Key</label>
                            <input type="password" id="ebook-api" placeholder="Readarr API Key">
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-secondary" onclick="testConnection('ebook')">Test</button>
                            <button class="btn btn-primary" onclick="saveConfig('ebook')">Save</button>
                        </div>
                        <div id="ebook-status" class="status-msg"></div>
                    </div>
                    <div class="settings-card">
                        <h3>Audiobook Server</h3>
                        <div class="form-group">
                            <label for="audiobook-server-software">Server Software</label>
                            <select id="audiobook-server-software">
                                <option value="readarr">Readarr</option>
                                <option value="bookshelf">Bookshelf</option>
                                <option value="lazylibrarian">LazyLibrarian</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="audiobook-url">URL</label>
                            <input type="text" id="audiobook-url" placeholder="http://192.168.1.100:8788">
                        </div>
                        <div class="form-group">
                            <label for="audiobook-api">API Key</label>
                            <input type="password" id="audiobook-api" placeholder="Readarr API Key">
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-secondary" onclick="testConnection('audiobook')">Test</button>
                            <button class="btn btn-primary" onclick="saveConfig('audiobook')">Save</button>
                        </div>
                        <div id="audiobook-status" class="status-msg"></div>
                    </div>
                </div>
            </div>

            <!-- Users Page -->
            <div id="page-users" class="page admin-only">
                <div class="page-header">
                    <h2>User Management</h2>
                    <button class="btn btn-primary" onclick="openAddUserModal()">Add User</button>
                </div>
                <div id="users-list" class="users-list"></div>

                <div class="ldap-section">
                    <details>
                        <summary class="ldap-summary">Advanced</summary>
                        <div class="settings-card" style="margin-top: 1rem;">
                            <h3>LDAP Configuration</h3>
                            <div class="form-group">
                                <label class="toggle-label">
                                    <input type="checkbox" id="ldap-enabled">
                                    Enable LDAP Authentication
                                </label>
                            </div>
                            <div class="form-group">
                                <label for="ldap-server-url">Server URL</label>
                                <input type="text" id="ldap-server-url" placeholder="ldap://dc.example.com:389">
                            </div>
                            <div class="form-group">
                                <label for="ldap-bind-dn">Bind User</label>
                                <input type="text" id="ldap-bind-dn" placeholder="CN=svc_libreseerr,OU=Service Accounts,DC=example,DC=com">
                            </div>
                            <div class="form-group">
                                <label for="ldap-bind-password">Bind Password</label>
                                <input type="password" id="ldap-bind-password" placeholder="Bind account password">
                            </div>
                            <div class="form-group">
                                <label for="ldap-base-dn">Base DN</label>
                                <input type="text" id="ldap-base-dn" placeholder="DC=example,DC=com">
                            </div>
                            <div class="form-group">
                                <label for="ldap-search-filter">User Search Filter</label>
                                <input type="text" id="ldap-search-filter" placeholder="(sAMAccountName={username})">
                            </div>
                            <div class="form-group">
                                <label for="ldap-default-role">Default Role for New LDAP Users</label>
                                <select id="ldap-default-role">
                                    <option value="user">User</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <div class="btn-group">
                                <button class="btn btn-secondary" onclick="testLDAP()">Test Connection</button>
                                <button class="btn btn-primary" onclick="saveLDAP()">Save</button>
                            </div>
                            <div id="ldap-status" class="status-msg"></div>
                        </div>
                    </details>
                </div>
            </div>
        </main>
    </div>

    <!-- Download Modal -->
    <div id="download-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Download Book</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Download Server</label>
                    <div class="server-select">
                        <button class="server-btn active" data-server="ebook">Ebook</button>
                        <button class="server-btn" data-server="audiobook">Audiobook</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="quality-profile">Quality Profile</label>
                    <select id="quality-profile"><option>Loading...</option></select>
                </div>
                <div class="form-group">
                    <label for="root-folder">Root Folder</label>
                    <select id="root-folder"><option>Loading...</option></select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="confirm-download-btn">Download</button>
            </div>
        </div>
    </div>

    <!-- User Modal -->
    <div id="user-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="user-modal-title">Add User</h3>
                <button class="modal-close" onclick="closeUserModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div id="user-modal-error" class="user-modal-error"></div>
                <input type="hidden" id="user-modal-original-username">
                <div class="form-group">
                    <label for="user-modal-username">Username</label>
                    <input type="text" id="user-modal-username" placeholder="Enter username" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="user-modal-password">Password</label>
                    <input type="password" id="user-modal-password" placeholder="Enter password" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="user-modal-role">Role</label>
                    <select id="user-modal-role">
                        <option value="user">User</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeUserModal()">Cancel</button>
                <button class="btn btn-primary" id="user-modal-save-btn" onclick="saveUserModal()">Save</button>
            </div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
